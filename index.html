<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性格診断</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #0f0f14;
    color: #e8e6f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #7c6ff7, #f76fa1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 40px;
  }
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 600px;
  }
  a.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 160px;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    text-decoration: none;
    color: #e8e6f0;
    transition: all 0.2s;
  }
  a.card:hover {
    border-color: #7c6ff7;
    box-shadow: 0 0 20px rgba(124,111,247,0.15);
    transform: translateY(-2px);
  }
  .card-icon { font-size: 36px; margin-bottom: 12px; }
  .card-name { font-size: 16px; font-weight: 700; }
  .card-type { font-size: 12px; color: #8a8a9a; margin-top: 4px; }
</style>
</head>
<body>
  <h1>性格診断</h1>
  <div class="cards">
    <a class="card" href="shoki/index.html">
      <div class="card-icon">👑</div>
      <div class="card-name">shoki</div>
      <div class="card-type">ENTJ-A</div>
    </a>
    <a class="card" href="naoki/index.html">
      <div class="card-icon">🎯</div>
      <div class="card-name">naoki</div>
      <div class="card-type">ENTP-A</div>
    </a>
    <a class="card" href="takumi/index.html">
      <div class="card-icon">🌈</div>
      <div class="card-name">takumi</div>
      <div class="card-type">ENFP-T</div>
    </a>
  </div>
</body>
</html>
